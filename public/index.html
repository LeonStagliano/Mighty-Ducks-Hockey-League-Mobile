<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mighty Ducks Hockey League</title>
    <link id="style" rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="./assets/Logo-MDHL.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@500&display=swap" rel="stylesheet">
</head>

<body id="app">

    {{setDocumentTitle}}
    <!-- WELCOME PAGE -->

    <template v-if="page === `welcome`">
        <div class="hero-container">
            <button class="link" @click="page = `home`" class="hero-container">
                <img class="logo" src="./assets/Logo-MDHL.png" />
                <div class="hero-text-container">
                    <p class="hero-text">MIGHTY DUCKS</p>
                    <p class="hero-text">HOCKEY LEAGUE</p>
                </div>
            </button>
        </div>


    </template>

    <!-- WEBSITE CONTENT -->

    <template v-if="page !== `welcome`">

        <header>
            <nav class="navbar">
                <h1 class="page-title">{{page}}</h1>
                <label class="hamburger-container">
                    <input v-model="menu" type="checkbox" name="" id="hamburger-btn">
                    <div class="bar">
                        <span class="top"></span>
                        <span class="middle"></span>
                        <span class="bottom"></span>
                    </div>
                </label>
            </nav>
        </header>

        <main class="main-container">

            <template v-if="menu === true">
                <div @click="menu = false" class="modal-background">
                    <div class="modal-content">
                        <template v-if="page === `home`">
                            <button class="link modal-link active">Home</button>
                        </template>
                        <template v-else>
                            <button class="link modal-link" @click="page = `home`">Home</button>
                        </template>
                        <template v-if="page === `about us`">
                            <button class="link modal-link active">About MDHL</button>
                        </template>
                        <template v-else>
                            <button class="link modal-link" @click="page = `about us`">About MDHL</button>
                        </template>
                        <template v-if="page === `games schedule`">
                            <button class="link modal-link active">Games Schedule</button>
                        </template>
                        <template v-else>
                            <button class="link modal-link" @click="page = `games schedule`">Games Schedule</button>
                        </template>
                        <template v-if="page === `galery`">
                            <button class="link modal-link active">Galery</button>
                        </template>
                        <template v-else>
                            <button class="link modal-link" @click="page = `galery`">Galery</button>
                        </template>
                        <template v-if="page === `rules & policies`">
                            <button class="link modal-link active">Rules & Policies</button>
                        </template>
                        <template v-else>
                            <button class="link modal-link" @click="page = `rules & policies`">Rules & Policies</button>
                        </template>
                        <template v-if="page === `registration form`">
                            <button class="link modal-link active">Registration Form</button>
                        </template>
                        <template v-else>
                            <button class="link modal-link" @click="page = `registration form`">Registration Form</button>
                        </template>
                        <template v-if="page === `profile`">
                            <button class="link modal-link active">Profile</button>
                        </template>
                        <template v-else>
                            <button class="link modal-link" @click="page = `profile`">Profile</button>
                        </template>
                        <template v-if="page === `contact us`">
                            <button class="link modal-link active">Contact Us</button>
                        </template>
                        <template v-else>
                            <button class="link modal-link" @click="page = `contact us`">Contact Us</button>
                        </template>
                    </div>
                </div>
            </template>

            <!-- HOME - UPCOMING EVENTS -->

            <template v-if="page === `home`">

                <div class="main-title-container">
                    <h2 class="main-title">UPCOMING EVENTS</h2>
                </div>
                <section class="main-container">

                    <template v-for="event in events">

                        <div v-if="horaActual < event.date" class="card-event">
                            <template v-if="event.type === `match`">
                                <h3 class="card-title">{{event.month}} {{event.day}} - {{event.time}}</h3>
                                <div class="card-match-content">
                                    <p class="text-card-match">{{event.team1}}</p>
                                    <p class="versus">VS</p>
                                    <p class="text-card-match">{{event.team2}}</p>
                                </div>
                            </template>
                            <template v-else>
                                <h3 class="card-title">{{event.month}} {{event.day}}</h3>
                                <p class="card-content">{{event.title}}</p>
                            </template>
                        </div>
                        <div v-else class="card-event-finished">
                            <template v-if="event.type === `match`">
                                <h3 class="card-title">{{event.month}} {{event.day}} - {{event.time}}</h3>
                                <div class="card-match-content">
                                    <p class="text-card-match">{{event.team1}}</p>
                                    <p class="versus">VS</p>
                                    <p class="text-card-match">{{event.team2}}</p>
                                </div>
                            </template>
                            <template v-else>
                                <h3 class="card-title">{{event.month}} {{event.day}}</h3>
                                <p class="card-content">{{event.title}}</p>
                            </template>
                        </div>
                    </template>

                </section>
            </template>

            <!-- ABOUT MDHL -->

            <template v-if="page === `about us`">

                <div class="main-title-container">
                    <h2 class="main-title">MIGHTY DUCKS HOCKEY LEAGUE</h2>
                </div>
        
                <img id="logo-about" src="./assets/Logo-MDHL.png" />
        
                <section class="accordion">
                    <div @click="expandAccordion(`item1`)">
                        <div class="accordion-btn-container">
                            <h4>MISSION</h4>
                            <template v-if="accordionItem1Expanded === false">
                                <div class="icon">
                                    <span class="arrow-line1"></span>
                                    <span class="arrow-line2"></span>
                                </div>
                            </template>
                            <template v-if="accordionItem1Expanded === true">
                                <div class="icon">
                                    <span class="arrow-line1b"></span>
                                    <span class="arrow-line2b"></span>
                                </div>
                            </template>
                        </div>
                        <template v-if="accordionItem1Expanded === true">
                            <p class="content">To support young athletes living in Chicago's northside neighborhoods, who have
                                an interest in learning
                                and playing soccer, with opportunities to learn and practice skills related to the game of
                                soccer,
                                specifically those skills around team cooperation and good sportsmanship.</p>
                        </template>
                    </div>
                    <div @click="expandAccordion(`item2`)">
                        <div class="accordion-btn-container">
                            <h4>VISION</h4>
                            <template v-if="accordionItem2Expanded === false">
                                <div class="icon">
                                    <span class="arrow-line1"></span>
                                    <span class="arrow-line2"></span>
                                </div>
                            </template>
                            <template v-if="accordionItem2Expanded === true">
                                <div class="icon">
                                    <span class="arrow-line1b"></span>
                                    <span class="arrow-line2b"></span>
                                </div>
                            </template>
                        </div>
                        <template v-if="accordionItem2Expanded === true">
                            <p class="content">The Mighty Ducks Hockey League aspires to develop strong, well-rounded, and
                                mindful athletes through the
                                building of character, self-discipline, and leadership.</p>
                        </template>
                    </div>
                    <div @click="expandAccordion(`item3`)">
                        <div class="accordion-btn-container">
                            <h4>GENERAL INFORMATION</h4>
                            <template v-if="accordionItem3Expanded === false">
                                <div class="icon">
                                    <span class="arrow-line1"></span>
                                    <span class="arrow-line2"></span>
                                </div>
                            </template>
                            <template v-if="accordionItem3Expanded === true">
                                <div class="icon">
                                    <span class="arrow-line1b"></span>
                                    <span class="arrow-line2b"></span>
                                </div>
                            </template>
                        </div>
                        <template v-if="accordionItem3Expanded === true">
                            <p class="content">The Mighty Ducks Hockey League was established in 1996 to provide athletes
                                residing in Chicago's
                                northside neighborhoods an environment in which to learn and play soccer. To be a member of
                                MDHL, you
                                must be between the ages of 4 - 12 and reside in a Chicago northside neighborhood. MDHL is run
                                by a
                                small full-time staff, and relies on the generous volunteer time of parents and previous league
                                members.
                            </p>
                        </template>
                </section>
            </template>

            <!-- GAMES SCHEDULE -->

            <template v-if="page === `games schedule`">

                {{filter}}

        <div class="games-title-container">
            <h2 class="main-title">GAMES SCHEDULE</h2>
            <p class="tap-msg">Tap on Match for More Details</p>
        </div>
        <div class="selects-container">
            <div @click="showOptions()" class="filter-container">
                <label class="select-label">Filter By Team</label>
                <div class="icon">
                    <span class="arrow-line1"></span>
                    <span class="arrow-line2"></span>
                </div>
            </div>
            <template v-if="selectOptions === true">
                <div class="select-options">
                    <option @click="teamToFilter(`All`)" value="All" class="options">All</option>
                    <option @click="teamToFilter(`U1`)" value="U1" class="options">U1</option>
                    <option @click="teamToFilter(`U2`)" value="U2" class="options">U2</option>
                    <option @click="teamToFilter(`U3`)" value="U3" class="options">U3</option>
                    <option @click="teamToFilter(`U4`)" value="U4" class="options">U4</option>
                    <option @click="teamToFilter(`U5`)" value="U5" class="options">U5</option>
                    <option @click="teamToFilter(`U6`)" value="U6" class="options">U6</option>
                </div>
            </template>
        </div>
        <div class="filter-container">
            <h4 class="select-label">Show Finisheds</h4>
            <label class="check-box">
                <input v-model="showFinisheds" class="checkbox" type="checkbox" name="" id="">
                <template v-if="showFinisheds === true">
                    <div class="checked"></div>
                </template>
            </label>
        </div>

        <section class="main-container">
            <template v-if="gamesFiltered">
                <template v-for="game in gamesFiltered">
                    <template v-if="game.status === `Finished` && showFinisheds === true">
                        <div @click="page = `game info`; gameDetails = game" class="card-event-finished card-link">
                            <h3 class="card-title">{{game.month}} {{game.day}} - {{game.time}}</h3>
                            <div class="card-match-content">
                                <p class="text-card-match">{{game.team1}}</p>
                                <p class="versus">VS</p>
                                <p class="text-card-match">{{game.team2}}</p>
                            </div>
                        </div>
                    </template>
                    <template v-if="game.status === `To Play`">
                        <div @click="page = `game info`; gameDetails = game" class="card-event card-link">
                            <h3 class="card-title">{{game.month}} {{game.day}} - {{game.time}}</h3>
                            <div class="card-match-content">
                                <p class="text-card-match">{{game.team1}}</p>
                                <p class="versus">VS</p>
                                <p class="text-card-match">{{game.team2}}</p>
                            </div>
                        </div>
                    </template>
                </template>
            </template>
        </section>

            </template>

            <!-- GAME DETAILS -->

            <template v-if="page === `game info`">

                <div class="match-details-container">
                    <div class="card-event">
                        <div class="card-match-content">
                            <p class="text-card-match">{{gameDetails.team1}}</p>
                            <p class="versus">VS</p>
                            <p class="text-card-match">{{gameDetails.team2}}</p>
                        </div>
                    </div>
                    <div class="game-details">
                        <h5>Date: {{gameDetails.month}} {{gameDetails.day}}</h5>
                        <h5>Time: {{gameDetails.time}}</h5>
                        <h5>Location: {{gameDetails.location}}</h5>
                        <h5>Status: {{gameDetails.status}}</h5>
                    </div>
                    <div class="map-container">
                        <div v-html="gameDetails.map"></div>
                    </div>
                </div>
                <div class="card-event">
                    <h3 class="card-title">FINAL SCORE</h3>
                    <div class="card-match-content">
                        <p class="text-card-match">{{gameDetails.score1}}</p>
                        <p class="text-card-match">-</p>
                        <p class="text-card-match">{{gameDetails.score2}}</p>
                    </div>
                </div>
                <div class="table-header">
                    <h5>{{gameDetails.team1}}</h5>
                    <h5>TEAMS INFO</h5>
                    <h5>{{gameDetails.team2}}</h5>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Player</th>
                                <th>Pos</th>
                                <th>#</th>
                            </tr>
                        </thead>                
                        <tbody>
                            <tr v-for="player in teams[0].players">
                                <td>{{player.name}}</td>
                                <td>{{player.position}}</td>
                                <td>{{player.number}}</td>
                            </tr>
                        </tbody>
                    </table>
        
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Player</th>
                                <th>Pos</th>
                                <th>#</th>
                            </tr>
                        </thead>                
                        <tbody>
                            <tr v-for="player in teams[1].players">
                                <td>{{player.name}}</td>
                                <td>{{player.position}}</td>
                                <td>{{player.number}}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </template>

            <!-- GALERY -->

            <template v-if="page === `galery`">

                <section class="galery-container">
                    <template v-for="picture in pictures">
                        <img class="picture" :src="picture"/>
                    </template>
                </section>

            </template>

            <!-- RULES & POLICIES -->

            <template v-if="page === `rules & policies`">

                <div class="main-title-container">
                    <h2 class="main-title">RULES OF PLAY & POLICIES</h2>
                </div>
                <p class="main-title-container card-comment">FIFA rules shall govern MDHL play except as modified herein.</p>
        
        
                <section class="accordion">
        
                    <div @click="expandAccordion(`item1`)">
                        <div class="accordion-btn-container">
                            <h4>SPORTSMANSHIP</h4>
                            <template v-if="accordionItem1Expanded === false">
                                <div class="icon">
                                    <span class="arrow-line1"></span>
                                    <span class="arrow-line2"></span>
                                </div>
                            </template>
                            <template v-if="accordionItem1Expanded === true">
                                <div class="icon">
                                    <span class="arrow-line1b"></span>
                                    <span class="arrow-line2b"></span>
                                </div>
                            </template>
                        </div>
                        <template v-if="accordionItem1Expanded === true">
                            <ul class="u-list">
                                <li class="list-content">The common interest that members of the Association share is to inspire
                                    youth to practice
                                    the ideals of sportsmanship and fair play. Any player, coach, team, parent, spectator,
                                    administrator or referee whose behavior detracts from this purpose is subject to
                                    disciplinary action regardless of technical soccer background, expertise, accomplishments or
                                    standing.</li>
                            </ul>
                        </template>
                    </div>
        
                    <div @click="expandAccordion(`item2`)">
                        <div class="accordion-btn-container">
                            <h4>FIFA FIELD REGULATIONS</h4>
                            <template v-if="accordionItem2Expanded === false">
                                <div class="icon">
                                    <span class="arrow-line1"></span>
                                    <span class="arrow-line2"></span>
                                </div>
                            </template>
                            <template v-if="accordionItem2Expanded === true">
                                <div class="icon">
                                    <span class="arrow-line1b"></span>
                                    <span class="arrow-line2b"></span>
                                </div>
                            </template>
                        </div>
                        <template v-if="accordionItem2Expanded === true">
                            <ol class="o-list">
                                <li class="list-content"><b>DIMENSIONS.</b> FIFA Law 1 provides for flexible external field
                                    dimensions
                                    within a given maximum and minimum width and length. These dimensions should be adhered to
                                    for all fields used by teams under 12 and older.</li>
                                <li class="list-content"><b>COMPETITION FIELDS.</b> Fields used within the competition program
                                    must be
                                    a minimum of 100 x 60 yards. Leagues, districts or associations participating in the state
                                    competition program that are unable to provide a field that meets these minimum requirements
                                    must advise the State Competition Board which will assign its Fields Committee to inspect
                                    the field and recommend to the Board whether or not a waiver of the minimum dimensions
                                    should be granted. Teams from leagues, districts or associations that are unable to provide
                                    an acceptable field may be required to play all their games away.</li>
                                <li class="list-content"><b>FIELDS USED BY YOUNG AGE GROUPS.</b>
                                    <ol class="o-list-latin">
                                        <li>U-6 play on a field approximately 20 X 40 yards with no penalty
                                            areas. Fields for older age groups should be progressively larger.</li>
                                        <li>U-8 plays on a field 40-50 yards in length and 20-30 yards
                                            width.</li>
                                        <li>U-10 play on a field 70-80 yards in length and 40-50 yards in
                                            width.</li>
                                        <li>In addition, fields used by young age groups may have their
                                            internal dimensions and size of goal similarly modified.</li>
                                    </ol>
                                </li>
                                <li class="list-content"><b>TEAM BENCH AREAS</b>
                                    <ol class="o-list-latin">
                                        <li class="list-content">Recreation & District Programs
                                            <ul>
                                                <li class="list-content">The decision for team/spectator placement on the field
                                                    will be made by the governing body of that team. A team's bench area shall
                                                    consist of that area at least one (1) yard away from the touchline and
                                                    extending to twenty yards (20) both ways from the halfway line. In the event
                                                    that field 2 conditions require team benches to be on the same side of the
                                                    field, a team's bench area shall consist of that area two(2) yards away from
                                                    the touchline and extending twenty yards one (1) way from the halfway line.
                                                </li>
                                                <li class="list-content">The home team has first choice as to where it wishes to
                                                    locate
                                                    its bench area. Coaches and substitutes are required to remain within their
                                                    bench
                                                    area during the game. Parents and spectators should occupy the same side of
                                                    the
                                                    field as the team they are supporting.</li>
                                            </ul>
                                        </li>
                                        <li class="list-content">State Competition League Only
                                            <ul>
                                                <li class="list-content">Except where it is determined by the referee to be
                                                    impractical, team bench areas shall be along the same touchline. Each team
                                                    bench area shall be located two yards outside the touchline, beginning not
                                                    closer than five yards from midfield and extending not further than twenty
                                                    yards from midfield. The home team shall have the right to choose the
                                                    location of its bench area. Coaches and substitutes must remain within their
                                                    team's bench area during the game.</li>
                                                <li class="list-content">Parents and spectators must occupy the sideline
                                                    opposite the team bench areas. Supporters of a team must assemble on the
                                                    side of the midfield facing the team bench area of that team. There shall be
                                                    a buffer zone extending ten yards on each side of the midfield that may not
                                                    be occupied by parents or spectators. Match officials shall be empowered to
                                                    enforce these provisions and may suspend or terminate games in the event
                                                    that any team, coach, parent, or spectator declines to abide by requests
                                                    from match officials to comply with these standards.</li>
                                            </ul>
                                    </ol>
                            </ol>
                        </template>
                    </div>
        
                    <div @click="expandAccordion(`item3`)">
                        <div class="accordion-btn-container">
                            <h4>EQUIPMENT</h4>
                            <template v-if="accordionItem3Expanded === false">
                                <div class="icon">
                                    <span class="arrow-line1"></span>
                                    <span class="arrow-line2"></span>
                                </div>
                            </template>
                            <template v-if="accordionItem3Expanded === true">
                                <div class="icon">
                                    <span class="arrow-line1b"></span>
                                    <span class="arrow-line2b"></span>
                                </div>
                            </template>
                        </div>
                        <template v-if="accordionItem3Expanded === true">
                            <ul class="u-list">
                                <li class="list-content">We will abide by and accept equipment standards as defined by FIFA,
                                    USSF and USYSA.</li>
                            </ul>
                        </template>
                    </div>
        
                    <div @click="expandAccordion(`item4`)">
                        <div class="accordion-btn-container">
                            <h4>NUMBER OF PLAYERS</h4>
                            <template v-if="accordionItem4Expanded === false">
                                <div class="icon">
                                    <span class="arrow-line1"></span>
                                    <span class="arrow-line2"></span>
                                </div>
                            </template>
                            <template v-if="accordionItem4Expanded === true">
                                <div class="icon">
                                    <span class="arrow-line1b"></span>
                                    <span class="arrow-line2b"></span>
                                </div>
                            </template>
                        </div>
                        <template v-if="accordionItem4Expanded === true">
                            <ul class="u-list">
                                <li class="list-content"><b>TEAM SIZE.</b>Except as noted below, below, team rosters shall
                                    consist of not less than eleven nor more than eighteen players. A team must have at least
                                    seven (7) players present and able to play before referees are permitted to start a
                                    sanctioned game. No more than eleven (11) players per team may be on the field at any one
                                    time during the game.</li>
                                <li class="list-content"><b>SIZE OF AGE GROUP TEAMS.</b>In order to give player's maximum
                                    opportunity to develop in the game of soccer, U-6 through U-1O play modified rules and size
                                    of roster as stated in United States Youth Soccer Association (USYSA) rules. It is strongly
                                    recommended that U-6 and U-8 play 4 v 4. UYSA shall not sanction games involving teams under
                                    10 or younger unless such games are conducted with not more than eight (8) players per side.
                                    (National rule 4036 section 2)</li>
                                <li class="list-content">Recreational/Developmental players at other ages or where numbers in
                                    the playing area are low are strongly encouraged to play small-sided games on reduced field
                                    size.</li>
                            </ul>
                        </template>
                    </div>
        
                    <div @click="expandAccordion(`item5`)">
                        <div class="accordion-btn-container">
                            <h4>SUBSTITUTIONS</h4>
                            <template v-if="accordionItem5Expanded === false">
                                <div class="icon">
                                    <span class="arrow-line1"></span>
                                    <span class="arrow-line2"></span>
                                </div>
                            </template>
                            <template v-if="accordionItem5Expanded === true">
                                <div class="icon">
                                    <span class="arrow-line1b"></span>
                                    <span class="arrow-line2b"></span>
                                </div>
                            </template>
                        </div>
                        <template v-if="accordionItem5Expanded === true">
                            <ul class="u-list">
                                <li class="list-content">Teams may make an unlimited number of substitutions at the times
                                    indicated below. A player who has been replaced may re-enter the game as a substitute at a
                                    later time.
                                    <ol>
                                        <li>Prior to a throw-in your favor.</li>
                                        <li>Prior to a goalkick by either team.</li>
                                        <li>After a goal by either team.</li>
                                        <li>After an injury, by either team, when the referee stops play.
                                        </li>
                                        <li>At half time.</li>
                                        <li>When a player has been "cautioned", only the player receiving
                                            "caution" may be substituted.</li>
                                    </ol>
                                </li>
                            </ul>
                        </template>
                    </div>
        
                    <div @click="expandAccordion(`item6`)">
                        <div class="accordion-btn-container">
                            <h4>CONFISCATED PLAYER PASSES</h4>
                            <template v-if="accordionItem6Expanded === false">
                                <div class="icon">
                                    <span class="arrow-line1"></span>
                                    <span class="arrow-line2"></span>
                                </div>
                            </template>
                            <template v-if="accordionItem6Expanded === true">
                                <div class="icon">
                                    <span class="arrow-line1b"></span>
                                    <span class="arrow-line2b"></span>
                                </div>
                            </template>
                        </div>
                        <template v-if="accordionItem6Expanded === true">
                            <ul class="u-list">
                                <li class="list-content">Passes of any individual(s) ejected from any match shall be retained
                                    after the match by the referee. The pass of any individual who has received a third caution

                                    the match in which the third caution was received. That player will be suspended from
                                    playing in the next game in which the offending participant would otherwise be eligible to
                                    participate. This process will continue so that for every third yellow card received during
                                    a playing year, the player will be suspended from playing in the next game (after the
                                    receipt of a third yellow card) for which the offending participate would otherwise be
                                    eligible to participate. The referee shall deliver all confiscated passes to the UYSA State
                                    Office within forty-eight (48) hours of the conclusion of the match.</li>

                                    their players 50% of each game.
