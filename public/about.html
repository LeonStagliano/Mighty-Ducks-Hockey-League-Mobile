<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About MDHL</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body id="app">
    <header>
        <nav class="navbar">
            <h1 class="page-title">ABOUT US</h1>
            <label class="hamburger-container">
                <input v-model="menu" type="checkbox" value="menu" name="" id="hamburger-btn">
                <div class="bar">
                    <span class="top"></span>
                    <span class="middle"></span>
                    <span class="bottom"></span>
                </div>
            </label>
        </nav>
    </header>

    <main class="main-container">

        <template v-if="menu === true">
            <div class="modal-background">
                <div class="modal-content">
                    <a class="modal-link" href="./home.html">Home</a>
                    <a class="modal-link active" href="#">About MDHL</a>
                    <a class="modal-link" href="">Games Schedule</a>
                    <a class="modal-link" href="">Galery</a>
                    <a class="modal-link" href="">Rules & Policies</a>
                    <a class="modal-link" href="">Registration Form</a>
                    <a class="modal-link" href="">Profile</a>
                    <a class="modal-link" href="">Contact Us</a>
                </div>
            </div>
        </template>

        <div class="main-title-container">
            <h2 class="main-title">MIGHTY DUCKS HOCKEY LEAGUE</h2>
        </div>

        <img id="logo-about" src="./assets/Logo-MDHL.png" />

        <section class="accordion">
            <div @click="expandAccordion(`mission`)">
                <div class="accordion-btn-container">
                    <h4>MISSION</h4>
                    <template v-if="missionExpanded === false">
                        <div class="icon">
                            <span class="arrow-line1"></span>
                            <span class="arrow-line2"></span>
                        </div>
                    </template>
                    <template v-if="missionExpanded === true">
                        <div class="icon">
                            <span class="arrow-line1b"></span>
                            <span class="arrow-line2b"></span>
                        </div>
                    </template>
                </div>
                <template v-if="missionExpanded === true">
                    <p class="content">To support young athletes living in Chicago's northside neighborhoods, who have
                        an interest in learning
                        and playing soccer, with opportunities to learn and practice skills related to the game of
                        soccer,
                        specifically those skills around team cooperation and good sportsmanship.</p>
                </template>
            </div>
            <div @click="expandAccordion(`vision`)">
                <div class="accordion-btn-container">
                    <h4>VISION</h4>
                    <template v-if="visionExpanded === false">
                        <div class="icon">
                            <span class="arrow-line1"></span>
                            <span class="arrow-line2"></span>
                        </div>
                    </template>
                    <template v-if="visionExpanded === true">
                        <div class="icon">
                            <span class="arrow-line1b"></span>
                            <span class="arrow-line2b"></span>
                        </div>
                    </template>
                </div>
                <template v-if="visionExpanded === true">
                    <p class="content">The Mighty Ducks Hockey League aspires to develop strong, well-rounded, and
                        mindful athletes through the
                        building of character, self-discipline, and leadership.</p>
                </template>
            </div>
            <div @click="expandAccordion(`generalInfo`)">
                <div class="accordion-btn-container">
                    <h4>GENERAL INFORMATION</h4>
                    <template v-if="generalInfoExpanded === false">
                        <div class="icon">
                            <span class="arrow-line1"></span>
                            <span class="arrow-line2"></span>
                        </div>
                    </template>
                    <template v-if="generalInfoExpanded === true">
                        <div class="icon">
                            <span class="arrow-line1b"></span>
                            <span class="arrow-line2b"></span>
                        </div>
                    </template>
                </div>
                <template v-if="generalInfoExpanded === true">
                    <p class="content">The Mighty Ducks Hockey League was established in 1996 to provide athletes
                        residing in Chicago's
                        northside neighborhoods an environment in which to learn and play soccer. To be a member of
                        MDHL, you
                        must be between the ages of 4 - 12 and reside in a Chicago northside neighborhood. MDHL is run
                        by a
                        small full-time staff, and relies on the generous volunteer time of parents and previous league
                        members.
                    </p>
                </template>
        </section>

    </main>

</body>
